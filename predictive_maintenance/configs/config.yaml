paths:
  raw_data: "./data/raw"
  processed_data: "./data/processed"
  interim_data: "./data/interim"
  models: "./models"
  pretrained: "./data/external/pretrained_models"

data:
  telemetry_file: "telemetry.csv"
  errors_file: "errors.csv"
  machines_file: "machines.csv"
  telemetry_cols:
    timestamp: "datetime"
    machine_id: "machineID"
    volt: "volt"
    rotate: "rotate"
    pressure: "pressure"
    vibration: "vibration"
  target_col: "failure_component"
  index_cols: ["datetime", "machineID"]

feature_windows:
  short: "5min"
  medium: "30min"
  long: "2h"

labeling:
  alert_horizon_hours: 8
  failure_window_days: 7
  healthy_window_days: 14

split:
  train_ratio: 0.6
  val_ratio: 0.2
  test_ratio: 0.2
  split_strategy: "time_based"

training:
  random_state: 42
  n_trials_optuna: 50
  cv_folds: 5
  cv_strategy: "blocked"

inference:
  batch_size: 1000
  max_latency_ms: 5
